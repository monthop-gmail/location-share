<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="แชร์ตำแหน่งแบบเรียลไทม์สำหรับกลุ่ม LINE" />
  <title>แชร์ตำแหน่งเพื่อน</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Thai Sans', system-ui; background: #f8f9fa; }
    #map { height: 70vh; width: 100%; }
    .controls { padding: 16px; text-align: center; }
    button {
      background: #00BFA5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 8px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="controls">
    <button id="shareBtn">📍 แชร์ตำแหน่งของฉัน</button>
    <button id="viewBtn">👁️ ดูตำแหน่งเพื่อน</button>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // Configuration - Replace with your own Supabase project details
    const SUPABASE_URL = 'https://kzfsndyatfzszhyuogbq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt6ZnNuZHlhdGZ6c3poeXVvZ2JxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMzQwMjksImV4cCI6MjA4NzYxMDAyOX0.Gl7v-x0LVq3BZtR_kPMxmSLvOTsJgynpO0eRHg3Ny4I';
    
    // Initialize Supabase
    let supabaseClient;
    try {
      if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
        console.warn('Please update SUPABASE_URL and SUPABASE_ANON_KEY in index.html');
      } else {
        // Access the global supabase object from the CDN
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (e) {
      console.error('Supabase init error:', e);
    }

    const map = L.map('map').setView([13.7563, 100.5018], 12);
    L.tileLayer('https://{a-d}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let myMarker = null;
    let otherMarkers = {};
    let userId = localStorage.getItem('user_id');
    
    if (!userId) {
      userId = 'user_' + Math.random().toString(36).substr(2, 9);
      localStorage.setItem('user_id', userId);
    }

    async function shareLocation() {
      if (!supabaseClient) return alert('กรุณาตั้งค่า Supabase URL/Key ในไฟล์ index.html ก่อน');
      
      if (!navigator.geolocation) return alert('เบราว์เซอร์ไม่รองรับ Geolocation');

      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;
        
        // Update map view
        map.setView([latitude, longitude], 15);
        if (myMarker) myMarker.remove();
        myMarker = L.marker([latitude, longitude]).addTo(map)
          .bindPopup('ฉันอยู่ที่นี่').openPopup();

        // Send to Supabase
        const { error } = await supabaseClient
          .from('locations')
          .upsert({ 
            user_id: userId, 
            lat: latitude, 
            lng: longitude,
            updated_at: new Date()
          }, { onConflict: 'user_id' });

        if (error) {
          console.error('Error sharing location:', error);
          alert('เกิดข้อผิดพลาดในการแชร์ตำแหน่ง: ' + error.message);
        } else {
          alert('แชร์ตำแหน่งเรียบร้อย! (หมดอายุใน 15 นาที)');
        }
      }, (err) => {
        alert('ไม่สามารถดึงตำแหน่งได้: ' + err.message);
      });
    }

    function subscribeToLocations() {
      if (!supabaseClient) return alert('กรุณาตั้งค่า Supabase URL/Key ในไฟล์ index.html ก่อน');

      // Fetch existing locations
      supabaseClient.from('locations').select('*').then(({ data, error }) => {
        if (!error && data) {
          data.forEach(updateMarker);
        }
      });

      // Subscribe to realtime changes
      supabaseClient
        .channel('public:locations')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'locations' }, payload => {
          console.log('Change received!', payload);
          if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
            updateMarker(payload.new);
          }
          // Handle DELETE/Expire logic if needed
        })
        .subscribe();
        
      alert('กำลังติดตามตำแหน่งเพื่อนๆ...');
    }

    function updateMarker(loc) {
      if (loc.user_id === userId) return; // Don't show myself as "other"

      // Check if expired (client-side check for immediate feedback)
      const expiresAt = new Date(loc.updated_at).getTime() + 15 * 60 * 1000;
      if (Date.now() > expiresAt) return; 

      if (otherMarkers[loc.user_id]) {
        otherMarkers[loc.user_id].setLatLng([loc.lat, loc.lng]);
      } else {
        otherMarkers[loc.user_id] = L.marker([loc.lat, loc.lng])
          .addTo(map)
          .bindPopup(`User: ${loc.user_id.substring(0, 5)}...`);
      }
    }

    document.getElementById('shareBtn').addEventListener('click', shareLocation);
    document.getElementById('viewBtn').addEventListener('click', subscribeToLocations);
  </script>
</body>
</html>
